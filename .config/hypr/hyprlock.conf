# =============================================
# hyprlock.conf — Cyberpunk theme
# Matches sddm-astronaut-theme cyberpunk colors:
#   Cyan:    #00F0FF
#   Red:     #FF003C
#   Magenta: #ca0174
#   Dark BG: #21222C
# =============================================

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

# Screenshot background, blurred + darkened to match cyberpunk feel
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    brightness = 0.4
    contrast = 1.0
    vibrancy = 0.2
}

# Large clock — cyan, just like the SDDM cyberpunk theme
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(00F0FFff)
    font_size = 86
    font_family = KogniGear, FiraCode Nerd Font, monospace
    shadow_passes = 3
    shadow_color = rgba(FF003Caa)
    position = 0, 160
    halign = center
    valign = center
}

# Date — red, matching DateTextColor
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%-m/%d 2077')"
    color = rgba(FF003Cff)
    font_size = 18
    font_family = KogniGear, FiraCode Nerd Font, monospace
    position = 0, 80
    halign = center
    valign = center
}

# "Loading ..." header text — magenta, matching HeaderText + HeaderTextColor
label {
    monitor =
    text = Loading ...
    color = rgba(ca0174ff)
    font_size = 14
    font_family = KogniGear, FiraCode Nerd Font, monospace
    position = 0, 110
    halign = center
    valign = center
}

# Password input field — red background, cyan text, matching the SDDM form
input-field {
    monitor =
    size = 300, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    outer_color = rgb(FF003C)
    inner_color = rgb(21222C)
    font_color = rgb(00F0FF)
    fade_on_empty = true
    placeholder_text = <span color="##ca0174">Password</span>
    hide_input = false
    check_color = rgb(00F0FF)
    fail_color = rgb(FF003C)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgb(ca0174)
    position = 0, -20
    halign = center
    valign = center
}
